name: Build macOS DMG
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4  # v3를 v4로 변경
      - name: Set up Python
        uses: actions/setup-python@v5 # v4를 v5로 변경 (최신 권장 버전)
        with: 
          python-version: '3.10'
      - name: Install dependencies
        run: pip install pyinstaller
      - name: Build with PyInstaller
        run: pyinstaller --noconfirm --onefile --windowed copycut_mac.py
      - name: Upload Build Result
        uses: actions/upload-artifact@v4 # v3를 v4로 변경
        with:
          name: CopyCut_macOS
          path: dist/copycut_mac
